<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hola fer miraa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; overflow: hidden; background: radial-gradient(circle at center, #1a0510 0%, #000 100%); 
            font-family: 'Montserrat', sans-serif; touch-action: manipulation;
        }
        
        .overlay {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-around; z-index: 10; pointer-events: none;
            padding: 40px 0;
        }

        .pregunta {
            color: #ffffff; font-family: 'Dancing Script', cursive; font-size: 2.5rem;
            text-align: center; text-shadow: 0 0 15px rgba(255, 51, 102, 0.8);
            max-width: 85%; min-height: 180px; line-height: 1.3;
        }

        .botones { 
            display: flex; gap: 30px; pointer-events: auto; 
            opacity: 0; transition: opacity 1s;
            position: relative; width: 100%; justify-content: center;
        }

        button {
            padding: 18px 45px; font-size: 1.3rem; font-weight: 600; cursor: pointer;
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 51, 102, 0.8); color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.95); }
        
        #btnNo { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: rgba(255,255,255,0.1);
            position: relative; z-index: 100;
        }

        @media (max-width: 768px) { 
            .pregunta { font-size: 1.6rem; min-height: 220px; } 
            button { padding: 15px 35px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h1 class="pregunta" id="typewriter"></h1>
        <div class="botones" id="btnGroup">
            <button onclick="celebrate()">SÍ</button>
            <button id="btnNo" onclick="dodge()" ontouchstart="dodge()">NO</button>
        </div>
    </div>

    <script>
        const textoOriginal = "Hola, eres alguien muy especial para mi, por eso quiero preguntarte si, ¿te gustaria ser mi san valentin?";
        const speed = 50; 
        let i = 0;

        function typeWriter() {
            if (i < textoOriginal.length) {
                document.getElementById("typewriter").innerHTML += textoOriginal.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            } else {
                document.getElementById("btnGroup").style.opacity = "1";
            }
        }

        let scene, camera, renderer, heart, starSystem;
        const P_COUNT = 15000;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 4;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = [];
            const cols = [];

            for (let i = 0; i < P_COUNT; i++) {
                const x = (Math.random() - 0.5) * 2.5;
                const y = (Math.random() - 0.5) * 2.5;
                const z = (Math.random() - 0.5) * 2.5;
                if (Math.pow(x*x + (2.25)*y*y + z*z - 1, 3) - x*x*Math.pow(z, 3) - (0.11)*y*y*Math.pow(z, 3) < 0) {
                    pos.push(x, z, -y);
                    cols.push(1, Math.random() * 0.2, 0.4);
                }
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
            
            const mat = new THREE.PointsMaterial({
                size: 0.045, vertexColors: true, blending: THREE.AdditiveBlending,
                transparent: true, opacity: 0.9, map: createCircleTexture()
            });
            heart = new THREE.Points(geo, mat);
            scene.add(heart);

            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<3000; i++) starPos.push((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starSystem = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.015, transparent: true, opacity: 0.4}));
            scene.add(starSystem);

            animate();
            typeWriter();
        }

        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255,255,255,1)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 64, 64);
            const tex = new THREE.Texture(canvas); tex.needsUpdate = true;
            return tex;
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;
            heart.rotation.y = t * 0.4;
            const s = 1 + Math.sin(t * 2.5) * 0.1;
            heart.scale.set(s, s, s);
            starSystem.rotation.y += 0.0003;
            renderer.render(scene, camera);
        }

        // --- FUNCIÓN DE HUIDA PARA CELULAR ---
        function dodge(e) {
            if (e) e.preventDefault(); // Evita que el clic se procese realmente
            const btn = document.getElementById('btnNo');
            
            // Calculamos posiciones aleatorias seguras
            const containerWidth = window.innerWidth - 100;
            const containerHeight = window.innerHeight - 100;
            
            const newX = Math.random() * containerWidth;
            const newY = Math.random() * containerHeight;

            btn.style.position = 'fixed';
            btn.style.left = `${newX}px`;
            btn.style.top = `${newY}px`;
        }

        function celebrate() {
            const text = document.getElementById('typewriter');
            text.innerHTML = "sabia que dirias que si jajdjajaj te quiero <3";
            text.style.color = "#ffeb3b";
            document.getElementById('btnGroup').style.display = 'none';
            
            const colors = heart.geometry.attributes.color.array;
            for(let i=0; i<colors.length; i+=3) {
                colors[i] = 1; colors[i+1] = 0.85; colors[i+2] = 0.1; 
            }
            heart.geometry.attributes.color.needsUpdate = true;
            heart.material.size = 0.08;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
